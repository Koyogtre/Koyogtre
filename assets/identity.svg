<svg
  width="1000"
  height="260"
  viewBox="0 0 1000 260"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    .label {
      fill: #8c959f;
    }

    @media (prefers-color-scheme: light) {
      .label {
        fill: #656d76;
      }
    }
  </style>

  <defs>
    <pattern
      id="pixelGrid"
      width="8"
      height="8"
      patternUnits="userSpaceOnUse"
    >
      <rect
        x="1"
        y="1"
        width="5.5"
        height="5.5"
        rx="0.7"
        fill="#e6edf3"
      >
        <animate
          attributeName="width"
          values="5.5;5.5;0.8;0.8;5.5;5.5"
          keyTimes="0;0.34;0.42;0.49;0.58;1"
          dur="8s"
          repeatCount="indefinite"
        />

        <animate
          attributeName="x"
          values="1;1;3.35;3.35;1;1"
          keyTimes="0;0.34;0.42;0.49;0.58;1"
          dur="8s"
          repeatCount="indefinite"
        />
      </rect>
    </pattern>

    <pattern
      id="pixelGridLight"
      width="8"
      height="8"
      patternUnits="userSpaceOnUse"
    >
      <rect
        x="1"
        y="1"
        width="5.5"
        height="5.5"
        rx="0.7"
        fill="#1f2328"
      >
        <animate
          attributeName="width"
          values="5.5;5.5;0.8;0.8;5.5;5.5"
          keyTimes="0;0.34;0.42;0.49;0.58;1"
          dur="8s"
          repeatCount="indefinite"
        />

        <animate
          attributeName="x"
          values="1;1;3.35;3.35;1;1"
          keyTimes="0;0.34;0.42;0.49;0.58;1"
          dur="8s"
          repeatCount="indefinite"
        />
      </rect>
    </pattern>

    <mask id="darkModeMask">
      <rect width="1000" height="260" fill="white" />
    </mask>
  </defs>

  <!-- dark mode -->
  <g class="dark-content">
    <text
      x="500"
      y="142"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="118"
      font-weight="700"
      letter-spacing="-5"
      fill="url(#pixelGrid)"
    >
      KOYOGTRE

      <animate
        attributeName="opacity"
        values="1;1;0;0;0;1"
        keyTimes="0;0.34;0.44;0.50;0.90;1"
        dur="8s"
        repeatCount="indefinite"
      />

      <animateTransform
        attributeName="transform"
        type="translate"
        values="
          0 0;
          0 0;
          0 -4;
          0 -4;
          0 4;
          0 0
        "
        keyTimes="0;0.34;0.44;0.50;0.90;1"
        dur="8s"
        repeatCount="indefinite"
      />
    </text>

    <text
      x="500"
      y="136"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="72"
      font-weight="650"
      letter-spacing="-3"
      fill="url(#pixelGrid)"
      opacity="0"
    >
      FULL STACK DEVELOPER

      <animate
        attributeName="opacity"
        values="0;0;0;1;1;0"
        keyTimes="0;0.38;0.48;0.58;0.90;1"
        dur="8s"
        repeatCount="indefinite"
      />

      <animateTransform
        attributeName="transform"
        type="translate"
        values="
          0 4;
          0 4;
          0 4;
          0 0;
          0 0;
          0 -4
        "
        keyTimes="0;0.38;0.48;0.58;0.90;1"
        dur="8s"
        repeatCount="indefinite"
      />
    </text>
  </g>

  <!-- light mode -->
  <g class="light-content">
    <style>
      .light-content {
        display: none;
      }

      @media (prefers-color-scheme: light) {
        .dark-content {
          display: none;
        }

        .light-content {
          display: inline;
        }
      }
    </style>

    <text
      x="500"
      y="142"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="118"
      font-weight="700"
      letter-spacing="-5"
      fill="url(#pixelGridLight)"
    >
      KOYOGTRE

      <animate
        attributeName="opacity"
        values="1;1;0;0;0;1"
        keyTimes="0;0.34;0.44;0.50;0.90;1"
        dur="8s"
        repeatCount="indefinite"
      />

      <animateTransform
        attributeName="transform"
        type="translate"
        values="
          0 0;
          0 0;
          0 -4;
          0 -4;
          0 4;
          0 0
        "
        keyTimes="0;0.34;0.44;0.50;0.90;1"
        dur="8s"
        repeatCount="indefinite"
      />
    </text>

    <text
      x="500"
      y="136"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="72"
      font-weight="650"
      letter-spacing="-3"
      fill="url(#pixelGridLight)"
      opacity="0"
    >
      FULL STACK DEVELOPER

      <animate
        attributeName="opacity"
        values="0;0;0;1;1;0"
        keyTimes="0;0.38;0.48;0.58;0.90;1"
        dur="8s"
        repeatCount="indefinite"
      />

      <animateTransform
        attributeName="transform"
        type="translate"
        values="
          0 4;
          0 4;
          0 4;
          0 0;
          0 0;
          0 -4
        "
        keyTimes="0;0.38;0.48;0.58;0.90;1"
        dur="8s"
        repeatCount="indefinite"
      />
    </text>
  </g>
</svg>
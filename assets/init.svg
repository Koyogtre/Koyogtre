<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .primary { fill: #f0f6fc; }
    .secondary { fill: #8b949e; }
    .line { stroke: #30363d; }
    .live { stroke: #3fb950; fill: #0d1117; }
    .green { fill: #3fb950; }
    @media (prefers-color-scheme: light) {
      .primary { fill: #1f2328; }
      .secondary { fill: #656d76; }
      .line { stroke: #d0d7de; }
      .live { stroke: #1a7f37; fill: #ffffff; }
      .green { fill: #1a7f37; }
    }
  </style>

  <defs>
    <filter id="blur" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- base route -->
  <path class="line" d="M40 151H1238" stroke-width="1" stroke-dasharray="1 10"/>

  <!-- inactive topology -->
  <g class="line" stroke-width="1" opacity=".6">
    <path d="M156 151V91H262"/>
    <path d="M362 151V211H482"/>
    <path d="M662 151V87H784"/>
    <path d="M916 151V215H1025"/>
    <path d="M1112 151V105H1190"/>
  </g>

  <!-- signal glow -->
  <circle r="11" class="green" opacity=".16" filter="url(#blur)">
    <animateMotion dur="8s" repeatCount="indefinite" path="M40 151H1238"/>
    <animate attributeName="opacity" values="0;.28;.28;0" keyTimes="0;.06;.94;1" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- signal -->
  <circle r="3" class="green">
    <animateMotion dur="8s" repeatCount="indefinite" path="M40 151H1238"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.025;.975;1" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- nodes -->
  <g class="live" stroke-width="1.2">
    <circle cx="156" cy="151" r="4">
      <animate attributeName="r" values="4;4;7;4" keyTimes="0;.08;.13;.19" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="362" cy="151" r="4">
      <animate attributeName="r" values="4;4;7;4" keyTimes="0;.25;.30;.36" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="662" cy="151" r="4">
      <animate attributeName="r" values="4;4;7;4" keyTimes="0;.50;.55;.61" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="916" cy="151" r="4">
      <animate attributeName="r" values="4;4;7;4" keyTimes="0;.71;.76;.82" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1112" cy="151" r="4">
      <animate attributeName="r" values="4;4;7;4" keyTimes="0;.87;.92;.98" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- initialization fragments -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">
    <text x="156" y="73" class="secondary" font-size="11" letter-spacing="2" text-anchor="middle" opacity="0">IDENTITY
      <animate attributeName="opacity" values="0;0;.75;.75;0" keyTimes="0;.08;.13;.26;.32" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="362" y="238" class="secondary" font-size="11" letter-spacing="2" text-anchor="middle" opacity="0">SYSTEM
      <animate attributeName="opacity" values="0;0;.75;.75;0" keyTimes="0;.25;.30;.43;.49" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="662" y="68" class="secondary" font-size="11" letter-spacing="2" text-anchor="middle" opacity="0">STATE
      <animate attributeName="opacity" values="0;0;.75;.75;0" keyTimes="0;.50;.55;.68;.74" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="916" y="242" class="secondary" font-size="11" letter-spacing="2" text-anchor="middle" opacity="0">ROUTE
      <animate attributeName="opacity" values="0;0;.75;.75;0" keyTimes="0;.71;.76;.89;.94" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="1112" y="87" class="secondary" font-size="11" letter-spacing="2" text-anchor="middle" opacity="0">LIVE
      <animate attributeName="opacity" values="0;0;.85;.85;0" keyTimes="0;.87;.92;.98;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <!-- name appears as system resolves -->
    <text x="640" y="137" class="primary" font-size="36" letter-spacing="11" text-anchor="middle" opacity="0">
      ALEXANDER ROTFUSS
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.55;.69;.92;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="640" y="181" class="secondary" font-size="12" letter-spacing="4" text-anchor="middle" opacity="0">
      SOFTWARE SYSTEMS / DE
      <animate attributeName="opacity" values="0;0;.8;.8;0" keyTimes="0;.60;.72;.92;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="40" y="34" class="secondary" font-size="10" letter-spacing="2">KYG / 2026</text>
    <text x="1240" y="34" class="secondary" font-size="10" letter-spacing="2" text-anchor="end">INIT_SEQUENCE_01</text>
  </g>
</svg>

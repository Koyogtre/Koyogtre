<svg
  width="1200"
  height="190"
  viewBox="0 0 1200 190"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    .dark {
      display: inline;
    }

    .light {
      display: none;
    }

    @media (prefers-color-scheme: light) {
      .dark {
        display: none;
      }

      .light {
        display: inline;
      }
    }
  </style>

  <defs>
    <pattern
      id="gridDark"
      width="7"
      height="7"
      patternUnits="userSpaceOnUse"
    >
      <rect
        x="0.7"
        y="0.7"
        width="5.6"
        height="5.6"
        rx="0.8"
        fill="#f0f6fc"
      >
        <animate
          attributeName="transform"
          values="
            rotate(0 3.5 3.5);
            rotate(0 3.5 3.5);
            rotate(90 3.5 3.5);
            rotate(90 3.5 3.5);
            rotate(0 3.5 3.5)
          "
          keyTimes="0;0.36;0.46;0.54;0.64"
          dur="8s"
          repeatCount="indefinite"
        />

        <animate
          attributeName="opacity"
          values="1;1;.22;.22;1"
          keyTimes="0;.36;.46;.54;.64"
          dur="8s"
          repeatCount="indefinite"
        />
      </rect>
    </pattern>

    <pattern
      id="gridLight"
      width="7"
      height="7"
      patternUnits="userSpaceOnUse"
    >
      <rect
        x="0.7"
        y="0.7"
        width="5.6"
        height="5.6"
        rx="0.8"
        fill="#1f2328"
      >
        <animate
          attributeName="transform"
          values="
            rotate(0 3.5 3.5);
            rotate(0 3.5 3.5);
            rotate(90 3.5 3.5);
            rotate(90 3.5 3.5);
            rotate(0 3.5 3.5)
          "
          keyTimes="0;0.36;0.46;0.54;0.64"
          dur="8s"
          repeatCount="indefinite"
        />

        <animate
          attributeName="opacity"
          values="1;1;.22;.22;1"
          keyTimes="0;.36;.46;.54;.64"
          dur="8s"
          repeatCount="indefinite"
        />
      </rect>
    </pattern>
  </defs>

  <g class="dark">
    <text
      x="600"
      y="126"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="142"
      font-weight="750"
      letter-spacing="-6"
      fill="url(#gridDark)"
    >
      KOYOGTRE

      <animate
        attributeName="opacity"
        values="1;1;0;0;0;1"
        keyTimes="0;.36;.48;.54;.90;1"
        dur="8s"
        repeatCount="indefinite"
      />
    </text>

    <text
      x="600"
      y="118"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="82"
      font-weight="700"
      letter-spacing="-3"
      fill="url(#gridDark)"
      opacity="0"
    >
      FULL STACK DEVELOPER

      <animate
        attributeName="opacity"
        values="0;0;0;1;1;0"
        keyTimes="0;.40;.50;.60;.90;1"
        dur="8s"
        repeatCount="indefinite"
      />
    </text>
  </g>

  <g class="light">
    <text
      x="600"
      y="126"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="142"
      font-weight="750"
      letter-spacing="-6"
      fill="url(#gridLight)"
    >
      KOYOGTRE

      <animate
        attributeName="opacity"
        values="1;1;0;0;0;1"
        keyTimes="0;.36;.48;.54;.90;1"
        dur="8s"
        repeatCount="indefinite"
      />
    </text>

    <text
      x="600"
      y="118"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="82"
      font-weight="700"
      letter-spacing="-3"
      fill="url(#gridLight)"
      opacity="0"
    >
      FULL STACK DEVELOPER

      <animate
        attributeName="opacity"
        values="0;0;0;1;1;0"
        keyTimes="0;.40;.50;.60;.90;1"
        dur="8s"
        repeatCount="indefinite"
      />
    </text>
  </g>
</svg>